essential: false
icon: assets/images/source/ic_launcher_border.png

# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting nextunnel.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up NexTunnel..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=com.nextunnel.app' "/usr/share/applications/nextunnel.desktop"
  - echo "Search and remove nextunnel.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/nextunnel.desktop" ]; then rm -f "$user_dir/.local/share/applications/nextunnel.desktop"; echo "Found and removed nextunnel.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "NexTunnel is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove NexTunnel configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing NexTunnel user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/nextunnel" ]; then rm -rf "$user_dir/.local/share/nextunnel"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/nextunnel
  - echo "NexTunnel data cleanup complete."

